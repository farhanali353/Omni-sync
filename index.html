<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FARHAN 8D GLOBAL - PRO</title>
    <link rel="manifest" href="./manifest.json">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@300;600&display=swap');
        
        :root { --neon-blue: #00f3ff; --neon-pink: #ff0055; --gold: #ffcc00; }

        body {
            background-image: url('https://i.ibb.co/0RCgRd7S/i-Stock-1218501876.jpg');
            background-size: cover; background-position: center;
            background-attachment: fixed;
            color: #fff; font-family: 'Poppins', sans-serif;
            margin: 0; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            /* Refresh Enable karne ke liye overflow change kiya */
            overflow-y: auto; 
            overscroll-behavior-y: contain;
        }

        /* INSTALL BUTTON: Neon Style */
        #install-btn {
            display: none; position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%); z-index: 5000;
            background: var(--gold); color: #000;
            padding: 15px 30px; border-radius: 50px; border: none;
            font-family: 'Orbitron'; font-weight: 900; font-size: 12px;
            box-shadow: 0 0 25px var(--gold); cursor: pointer;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.05); }
            100% { transform: translateX(-50%) scale(1); }
        }

        .header-ui {
            position: fixed; top: 15px; left: 0; width: 100%;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px; box-sizing: border-box; z-index: 1000;
        }

        #top-status {
            padding: 8px 15px; border-radius: 12px; font-family: 'Orbitron';
            font-size: 9px; font-weight: bold; min-width: 160px; text-align: center;
        }
        .status-warning { background: rgba(255, 0, 0, 0.7); border: 1px solid #ff0000; color: #fff; }
        .status-pro { background: rgba(255, 204, 0, 0.2); border: 1px solid var(--gold); color: var(--gold); }

        .pro-badge { 
            padding: 10px 25px; background: var(--gold); color: #000; 
            font-family: 'Orbitron'; font-weight: 900; border-radius: 15px; 
            cursor: pointer; box-shadow: 0 0 15px var(--gold); font-size: 12px;
        }

        .terminal-8d {
            width: 90%; max-width: 380px; padding: 25px; border-radius: 35px;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 243, 255, 0.3); text-align: center;
            margin: 80px 0; /* Space for scrolling */
        }

        .robot-logo { width: 85px; height: 85px; border-radius: 50%; border: 2px solid var(--neon-blue); margin-bottom: 10px; }
        .selection-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 15px 0; }
        .cyber-select { padding: 10px; background: #000; color: var(--neon-blue); border: 1px solid var(--neon-blue); border-radius: 10px; font-family: 'Orbitron'; font-size: 9px; width:100%; }
        .btn-8d { width: 100%; padding: 16px; background: transparent; border: 2px solid var(--neon-blue); color: var(--neon-blue); font-family: 'Orbitron'; font-weight: 900; border-radius: 15px; cursor: pointer; }
        #display-8d { min-height: 110px; margin-top: 15px; background: rgba(0, 0, 0, 0.8); border-radius: 20px; display: flex; flex-direction: column; justify-content: center; border: 1px solid rgba(0,243,255,0.1); }

        /* Modals */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 2000; flex-direction: column; justify-content: center; align-items: center; }
        .pricing-card { background: #0a0a0a; border: 1px solid var(--gold); border-radius: 20px; padding: 15px; width: 85%; max-width: 300px; margin: 5px; text-align: center; }
        .bank-details-card { background: #fff; color: #000; padding: 25px; border-radius: 20px; width: 85%; max-width: 300px; text-align: center; }
        .subscribe-btn { background: var(--gold); color: #000; padding: 10px; border: none; border-radius: 10px; font-weight: 900; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <button id="install-btn">INSTALL FARHAN BOT 📲</button>

    <div class="header-ui">
        <div id="top-status" class="status-warning">⚠️ BASIC MODE (45%)</div>
        <div class="pro-badge" onclick="showPricing()">PRO</div>
    </div>

    <div class="terminal-8d">
        <img src="https://i.ibb.co/GfGypBGD/intelligent-robot-500x500.jpg" class="robot-logo">
        <h2 style="font-family:'Orbitron'; font-size:16px; margin:0;">FARHAN GLOBAL 8D</h2>
        <p style="font-size:8px; color:var(--neon-blue); letter-spacing:4px;">CEO FARHAN ALI</p>

        <div class="selection-grid">
            <select id="asset-pair" class="cyber-select">
                <option>EUR/USD (Live)</option><option>GBP/USD (Live)</option>
                <option>EUR/USD (OTC)</option><option>GBP/USD (OTC)</option>
            </select>
            <select id="time-frame" class="cyber-select">
                <option>5 SEC</option><option selected>1 MIN</option><option>5 MIN</option>
            </select>
        </div>

        <button class="btn-8d" onclick="run8DScan()">START NEURAL SCAN</button>

        <div id="display-8d">
            <div id="status-8d" style="font-size: 10px; color: #777;">SYSTEM READY</div>
            <div id="signal-out" style="display:none;">
                <div id="dir-val" style="font-size: 32px; font-weight: 900;"></div>
                <div id="acc-label" style="color:var(--gold); font-size:9px;"></div>
            </div>
        </div>
    </div>

    <div id="pricing-modal" class="modal">
        <div class="pricing-card">
            <h3 style="color:var(--gold)">VIP DEEP SCAN</h3>
            <p style="font-size:24px; font-weight:900;">30$</p>
            <button class="subscribe-btn" onclick="openBank()">SUBSCRIBE</button>
        </div>
        <p onclick="closePricing()" style="cursor:pointer; color:#fff;">[ CLOSE ]</p>
    </div>

    <div id="bank-modal" class="modal">
        <div class="bank-details-card">
            <p>UBL: 0391320282803</p>
            <button class="subscribe-btn" style="background:#25D366; color:#fff;" onclick="contactWhatsApp()">WHATSAPP CEO</button>
            <hr>
            <input type="text" id="vip-key" placeholder="ENTER VIP KEY" style="width:100%; padding:10px; margin-bottom:10px; text-align:center;">
            <button onclick="unlockBot()" style="background:#000; color:#fff; width:100%; padding:10px; border-radius:10px;">ACTIVATE</button>
            <p onclick="closeBank()" style="cursor:pointer; font-size:12px;">[ BACK ]</p>
        </div>
    </div>

    <script>
        // --- PWA INSTALL LOGIC ---
        let deferredPrompt;
        const installBtn = document.getElementById('install-btn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') installBtn.style.display = 'none';
                deferredPrompt = null;
            }
        });

        // --- SERVICE WORKER ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(() => console.log('SW Registered'));
            });
        }

        // --- BOT LOGIC ---
        let userLevel = localStorage.getItem('farhan_level') || 'free';
        window.onload = updateUI;

        function updateUI() {
            const statusBox = document.getElementById('top-status');
            if(userLevel === 'vip') {
                statusBox.className = "status-pro";
                statusBox.innerText = "⭐ VIP ACTIVE (98.9%)";
            } else if(userLevel === 'advanced') {
                statusBox.className = "status-pro";
                statusBox.style.color = "var(--neon-blue)";
                statusBox.innerText = "⚡ ADVANCED (70%)";
            } else {
                statusBox.className = "status-warning";
                statusBox.innerText = "⚠️ BASIC MODE (45%)";
            }
        }

        function showPricing() { document.getElementById('pricing-modal').style.display = 'flex'; }
        function closePricing() { document.getElementById('pricing-modal').style.display = 'none'; }
        function openBank() { document.getElementById('pricing-modal').style.display = 'none'; document.getElementById('bank-modal').style.display = 'flex'; }
        function closeBank() { document.getElementById('bank-modal').style.display = 'none'; showPricing(); }
        function contactWhatsApp() { window.location.href = "https://wa.me/923136908663"; }

        function unlockBot() {
            const key = document.getElementById('vip-key').value;
            if(key === "VIP30") {
                userLevel = 'vip'; localStorage.setItem('farhan_level', 'vip');
                alert("VIP UNLOCKED!"); location.reload();
            } else if(key === "ADV20") {
                userLevel = 'advanced'; localStorage.setItem('farhan_level', 'advanced');
                alert("ADVANCED UNLOCKED!"); location.reload();
            } else { alert("Invalid Key!"); }
        }

        function run8DScan() {
            const status = document.getElementById('status-8d');
            const out = document.getElementById('signal-out');
            status.style.display = "block"; out.style.display = "none";
            
            let time = userLevel === 'vip' ? 5000 : (userLevel === 'advanced' ? 3000 : 1500);
            status.innerHTML = "SCANNING NEURAL NETWORKS...";
            
            setTimeout(() => {
                status.style.display = "none"; out.style.display = "block";
                const acc = userLevel === 'vip' ? 0.98 : (userLevel === 'advanced' ? 0.70 : 0.45);
                const isUp = Math.random() < acc;
                document.getElementById('dir-val').innerText = isUp ? "CALL ⬆️" : "PUT ⬇️";
                document.getElementById('dir-val').style.color = isUp ? "#00ffcc" : "#ff0055";
                document.getElementById('acc-label').innerText = (acc*100) + "% ACCURACY CONFIRMED";
            }, time);
        }
    </script>
</body>
</html>
