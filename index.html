<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURELIUS PRO - BOSS EDITION</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="https://i.ibb.co/nGXQ4gr/Untitled-design-20260315-213122-0000.png">
<link rel="icon" href="https://i.ibb.co/nGXQ4gr/Untitled-design-20260315-213122-0000.png">

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@300;600&display=swap');
:root{ --neon-blue:#00f3ff; --neon-pink:#ff0055; --gold:#ffcc00; --bg:rgba(0,0,0,0.97); }

body{ 
    background-image:url('https://i.ibb.co/0RCgRd7S/i-Stock-1218501876.jpg'); 
    background-size:cover; background-attachment:fixed; 
    color:white; font-family:Poppins; text-align:center; margin:0; overflow-x: hidden;
}

.header-ui{ position:fixed; top:15px; left:0; width:100%; display:flex; justify-content:space-between; padding:0 15px; box-sizing:border-box; z-index:1000; }
#status-tag{ padding:8px 15px; border-radius:10px; font-family:Orbitron; font-size:10px; font-weight:bold; background:red; border:1px solid white; }
.pro-btn-header { background: var(--gold); color: black; padding: 8px 15px; border-radius: 10px; font-family: Orbitron; font-size: 10px; font-weight: 900; cursor: pointer; border: none; }

#pro-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 9999; padding-top: 50px; overflow-y: auto; }
.pricing-card { background: #111; border: 1px solid var(--gold); border-radius: 20px; padding: 20px; margin: 15px auto; width: 85%; max-width: 320px; cursor: pointer; }

.terminal-8d{ 
    width:92%; max-width:420px; margin:70px auto; 
    background:var(--bg); backdrop-filter:blur(30px); 
    padding:25px; border-radius:35px; border:1px solid var(--neon-blue); 
    box-shadow: 0 0 50px rgba(0, 243, 255, 0.4);
    position: relative; top: 60px;
}

.mode-toggle { margin-bottom: 15px; background: #000; border-radius: 50px; display: inline-flex; padding: 5px; border: 1px solid #333; }
.mode-btn { padding: 10px 20px; border-radius: 50px; font-size: 10px; font-family: Orbitron; cursor: pointer; color: #777; border:none; background:none; }
.mode-btn.active { background: var(--neon-blue); color: black; font-weight: 900; }

#search-container { display: none; margin-bottom: 10px; }
#coinSearch { 
    width: 100%; padding: 12px; background: rgba(255,255,255,0.05); 
    border: 1px solid rgba(0, 243, 255, 0.3); border-radius: 12px; 
    color: var(--gold); font-family: Orbitron; font-size: 11px; outline: none;
}

.cyber-select{ width:100%; padding:14px; background:black; color:var(--neon-blue); border:1px solid var(--neon-blue); border-radius:12px; font-family:Orbitron; font-size:10px; margin-bottom:10px; outline:none; }
.btn-8d{ width:100%; padding:20px; background:transparent; border:2px solid var(--neon-blue); color:var(--neon-blue); font-family:Orbitron; font-weight:900; border-radius:20px; cursor:pointer; letter-spacing:2px; text-transform:uppercase; }

#display { margin-top: 20px; min-height: 160px; display:flex; flex-direction:column; align-items:center; justify-content:center; }
#chart-area { margin-top: 20px; border-radius: 20px; overflow: hidden; height: 280px; border: 1px solid #333; background:#000; }

.logo-container { width: 100%; display: flex; justify-content: center; position: absolute; top: 40px; z-index: 500; }
.app-logo { width: 85px; height: 85px; border-radius: 50%; border: 2px solid var(--neon-blue); box-shadow: 0 0 20px var(--neon-blue); object-fit: cover; }
</style>
</head>
<body>

<div class="header-ui">
    <div id="status-tag">CORE ACTIVE</div>
    <button id="upgrade-btn" class="pro-btn-header" onclick="showPro()">UPGRADE PRO</button>
</div>

<div id="pro-panel">
    <button style="float: right; margin: 20px; background: none; border: none; color: white; font-size: 40px;" onclick="hidePro()">×</button>
    <h2 style="font-family: Orbitron; color: var(--gold); margin-top:40px;">SELECT VIP PLAN</h2>
    <div class="pricing-card" onclick="askVipCode('$20 Plan')"><h3>1 MONTH - $20</h3></div>
    <div class="pricing-card" onclick="askVipCode('$30 Plan')"><h3>3 MONTHS - $30</h3></div>
    <div class="pricing-card" style="border: 2px solid var(--gold);" onclick="askVipCode('Lifetime Plan')"><h3>LIFETIME - $50</h3></div>
</div>

<div class="logo-container">
    <img src="https://i.ibb.co/nGXQ4gr/Untitled-design-20260315-213122-0000.png" alt="AURELIUS LOGO" class="app-logo">
</div>

<div class="terminal-8d">
    <div class="mode-toggle">
        <button id="btn-quotex" class="mode-btn active" onclick="setMode('quotex')">QUOTEX</button>
        <button id="btn-binance" class="mode-btn" onclick="setMode('binance')">BINANCE</button>
    </div>

    <h2 style="font-family:Orbitron; margin:0; color:var(--neon-blue);">AURELIUS PRO</h2>
    <p style="font-size:9px; color:var(--neon-blue); font-weight:bold; margin-bottom:10px;">BOSS EDITION</p>

    <div id="search-container">
        <input type="text" id="coinSearch" placeholder="SEARCH COIN..." onkeyup="filterCoins()">
    </div>

    <select class="cyber-select" id="market-pair" onchange="refreshChart()"></select>
    
    <select class="cyber-select" id="time-frame" onchange="refreshChart()">
        <optgroup label="SECONDS">
            <option value="1S">5 SECONDS</option>
            <option value="10S">10 SECONDS</option>
            <option value="15S">15 SECONDS</option>
            <option value="30S">30 SECONDS</option>
        </optgroup>
        <optgroup label="MINUTES">
            <option value="1" selected>1 MINUTE</option>
            <option value="2">2 MINUTES</option>
            <option value="3">3 MINUTES</option>
            <option value="5">5 MINUTES</option>
            <option value="15">15 MINUTES</option>
            <option value="30">30 MINUTES</option>
            <option value="45">45 MINUTES</option>
        </optgroup>
        <optgroup label="HOURS / DAYS">
            <option value="60">1 HOUR</option>
            <option value="120">2 HOURS</option>
            <option value="240">4 HOURS</option>
            <option value="D">1 DAY</option>
        </optgroup>
    </select>

    <button class="btn-8d" onclick="runNeuralAnalysis()">START REAL ANALYSIS</button>

    <div id="display"><p style="font-size:10px; color:#444; font-family:Orbitron;">SYSTEM READY</p></div>
    <div id="chart-area"><div id="tv_chart_container" style="height: 100%;"></div></div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
const VIP_KEY = "BOSS786";
let currentMode = 'quotex';
let binanceFullList = [];

function checkVipStatus() {
    if (localStorage.getItem('aurelius_vip') === 'true') {
        document.getElementById('upgrade-btn').innerHTML = "VIP ACTIVE ✅";
        document.getElementById('upgrade-btn').onclick = null;
    }
}

function showPro() { 
    if (localStorage.getItem('aurelius_vip') === 'true') return;
    document.getElementById('pro-panel').style.display = 'block'; 
}

function hidePro() { document.getElementById('pro-panel').style.display = 'none'; }

function askVipCode(plan) {
    let userInput = prompt("Enter VIP Key:");
    if (userInput === VIP_KEY) {
        alert(plan + " Activated!");
        localStorage.setItem('aurelius_vip', 'true');
        document.getElementById('upgrade-btn').innerHTML = "VIP ACTIVE ✅";
        document.getElementById('upgrade-btn').onclick = null;
        hidePro();
    } else if (userInput !== null) { alert("Invalid Key!"); }
}

const quotexPairs = [
    {s: "EURUSD", n: "EUR/USD (LIVE)", t: "FX:EURUSD"},
    {s: "GBPUSD", n: "GBP/USD (LIVE)", t: "FX:GBPUSD"},
    {s: "EURUSD_OTC", n: "EUR/USD (OTC)", t: "FX_IDC:EURUSD"},
    {s: "GBPUSD_OTC", n: "GBP/USD (OTC)", t: "FX_IDC:GBPUSD"}
];

async function fetchBinanceAuto() {
    try {
        const res = await fetch('https://api.binance.com/api/v3/exchangeInfo');
        const data = await res.json();
        binanceFullList = data.symbols
            .filter(sym => sym.status === 'TRADING' && sym.quoteAsset === 'USDT')
            .map(sym => ({s: sym.symbol, n: sym.baseAsset + "/USDT", t: "BINANCE:" + sym.symbol}));
        if(currentMode === 'binance') populateSelect(binanceFullList);
    } catch (e) { }
}

function setMode(m) {
    currentMode = m;
    document.getElementById('btn-quotex').classList.toggle('active', m === 'quotex');
    document.getElementById('btn-binance').classList.toggle('active', m === 'binance');
    document.getElementById('search-container').style.display = (m === 'binance') ? 'block' : 'none';
    if(m === 'quotex') populateSelect(quotexPairs);
    else { if(binanceFullList.length === 0) fetchBinanceAuto(); else populateSelect(binanceFullList); }
}

function populateSelect(pairs) {
    const sel = document.getElementById('market-pair');
    sel.innerHTML = pairs.map(p => `<option value="${p.s}" data-tv="${p.t}">${p.n}</option>`).join('');
    refreshChart();
}

function filterCoins() {
    const term = document.getElementById('coinSearch').value.toUpperCase();
    const filtered = binanceFullList.filter(p => p.s.includes(term));
    populateSelect(filtered);
}

function refreshChart() {
    const sel = document.getElementById("market-pair");
    if(!sel.value) return;
    const symbol = sel.options[sel.selectedIndex].getAttribute("data-tv");
    const interval = document.getElementById("time-frame").value;
    document.getElementById("tv_chart_container").innerHTML = "";
    new TradingView.widget({ "autosize": true, "symbol": symbol, "interval": interval, "theme": "dark", "container_id": "tv_chart_container", "hide_top_toolbar": true });
}

async function runNeuralAnalysis() {
    let disp = document.getElementById("display");
    const select = document.getElementById("market-pair");
    const symbol = select.value;
    const interval = document.getElementById("time-frame").value;
    const pairName = select.options[select.selectedIndex].text;
    
    disp.innerHTML = `<p style="color:var(--neon-blue); font-family:Orbitron;">SCANNING MULTI-INDICATORS...</p>`;
    
    try {
        if (currentMode === 'binance') {
            const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval.includes('S') ? '1m' : interval}&limit=50`);
            const data = await res.json();
            
            // 1. RSI Calculation (14 Period)
            let gains = 0, losses = 0;
            for (let i = 36; i < 50; i++) {
                let diff = parseFloat(data[i][4]) - parseFloat(data[i-1][4]);
                if (diff >= 0) gains += diff; else losses -= diff;
            }
            let rs = gains / (losses || 1);
            let rsi = 100 - (100 / (1 + rs));

            // 2. EMA Calculation (20 Period)
            let sum = 0;
            for (let i = 30; i < 50; i++) sum += parseFloat(data[i][4]);
            let ema20 = sum / 20;

            // 3. Volume Check
            let currentVol = parseFloat(data[49][5]);
            let avgVol = 0;
            for (let i = 40; i < 49; i++) avgVol += parseFloat(data[i][5]);
            avgVol = avgVol / 9;

            const currentPrice = parseFloat(data[49][4]).toFixed(4);

            setTimeout(() => {
                let sig = "WAIT ⚠️", col = "#ffcc00";
                
                // MULTI-CONFIRMATION LOGIC
                let buySignal = (rsi < 35 && currentPrice > ema20 && currentVol > avgVol);
                let sellSignal = (rsi > 65 && currentPrice < ema20 && currentVol > avgVol);

                if (buySignal) { sig = "STRONG BUY 🟢"; col = "#00ffcc"; }
                else if (sellSignal) { sig = "STRONG SELL 🔴"; col = "#ff0055"; }
                
                disp.innerHTML = `<h1 style="color:${col}; font-family:Orbitron; font-size:24px; margin:0;">${sig}</h1>
                                  <p style="font-size:10px; color:white;">RSI: ${rsi.toFixed(1)} | EMA: ${ema20.toFixed(4)} | VOL: ${currentVol > avgVol ? 'HIGH' : 'LOW'}</p>`;
            }, 1000);
        } else {
            setTimeout(() => {
                let rsi = Math.floor(Math.random() * 60) + 20;
                let sig = rsi < 35 ? "STRONG BUY 🟢" : (rsi > 65 ? "STRONG SELL 🔴" : "WAIT ⚠️");
                let col = rsi < 35 ? "#00ffcc" : (rsi > 65 ? "#ff0055" : "#ffcc00");
                disp.innerHTML = `<h1 style="color:${col}; font-family:Orbitron; font-size:24px; margin:0;">${sig}</h1><p style="font-size:11px; color:white;">ANALYSIS COMPLETE</p>`;
            }, 1200);
        }
    } catch (e) { disp.innerHTML = `<p style="color:red; font-family:Orbitron;">SYSTEM BUSY</p>`; }
}

window.onload = () => { 
    checkVipStatus();
    setMode('quotex'); 
    fetchBinanceAuto(); 
};
</script>
</body>
</html>
